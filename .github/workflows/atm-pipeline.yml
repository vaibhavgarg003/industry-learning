name: ATM Analytics Pipeline CI

on:
  push:
    paths:
      - 'data-engineering/atm-analytics-pipeline/**'
  pull_request:
    paths:
      - 'data-engineering/atm-analytics-pipeline/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: data-engineering/atm-analytics-pipeline
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: data-engineering/atm-analytics-pipeline
        env:
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
        run: python3 -m pytest tests/ -v